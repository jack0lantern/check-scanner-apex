services:
  db:
    image: postgres:16-alpine
    container_name: check-scanner-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-checkdeposit}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkuser} -d ${POSTGRES_DB:-checkdeposit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: check-scanner-backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-checkuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-checkdeposit}
    ports:
      - "8080:8080"
    volumes:
      - settlement_output:/app/settlement-output
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: check-scanner-frontend
    working_dir: /app
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  settlement_output:
