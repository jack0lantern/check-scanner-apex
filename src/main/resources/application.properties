# Server
server.port=${APP_PORT:8080}

# PostgreSQL (values from .env via docker-compose or local)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:checkdeposit}
spring.datasource.username=${POSTGRES_USER:checkuser}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: use Flyway for schema, Hibernate does not manage DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
