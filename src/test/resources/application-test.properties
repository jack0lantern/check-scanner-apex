# H2 in-memory for @DataJpaTest
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# Return handling
return.fee-amount=30

# EOD batch: run every 2 seconds for test (verify cron fires)
eod.cron=0/2 * * * * *
eod.zone=UTC

# Settlement file output (test-specific temp dir)
settlement.output-path=${java.io.tmpdir}/check-scanner-settlement-test

# Short ack timeout for tests (1 minute)
settlement.ack-timeout-minutes=1

# Funding Service business rules
funding.max-deposit-amount=5000
funding.duplicate-window-hours=24
funding.contribution-cap.retirement=7000
